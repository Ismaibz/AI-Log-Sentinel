[general]
app_name = "AI-Log-Sentinel"
log_level = "INFO"

# ── Secrets ──────────────────────────────────────────────────────────────────

[secrets]
vault_path = "./secrets.vibe"
project_id = "AI-Log-Sentinel"
file_key = true

# ── Ingestion ────────────────────────────────────────────────────────────────

[tailer]
poll_interval = 0.5
offset_dir = ".offsets"

[pipeline]
batch_size = 5
batch_interval = 30
max_queue_size = 1000

# ── Anonymization ────────────────────────────────────────────────────────────

[anonymization]
enabled = true
token_ttl = 3600

[anonymization.patterns]
ipv4 = true
ipv6 = true
email = true
url_sensitive = true
path_ids = true

[noise_filter]
enabled = true
static_extensions = [
    ".css", ".js", ".png", ".jpg", ".jpeg", ".gif", ".ico", ".svg",
    ".woff", ".woff2", ".ttf", ".eot", ".mp4", ".mp3", ".pdf", ".zip",
]
health_paths = ["/health", "/healthz", "/ping", "/alive", "/ready"]
ignore_status_codes = []

# ── Reasoning (L1 rules + L2 AI) ────────────────────────────────────────────

[reasoning]
provider = "gemini"
context_window = 30
escalation_confidence = 0.6

# L1 — local pattern rules (instant, no AI)
[reasoning.rules]
enabled = true
brute_force_threshold = 5
path_fuzz_threshold = 5
brute_force_paths = ["/login", "/auth", "/signin", "/wp-login.php", "/api/login"]
sqli_patterns = ["UNION\\s+(ALL\\s+)?SELECT", "OR\\s+1\\s*=\\s*1", "'\\s*--", "%27", "1\\s*=\\s*1", "SELECT\\s+.*\\s+FROM"]
traversal_patterns = ["\\.\\./", "\\.\\.%2[fF]", "\\.\\.\\\\"]
scanner_uas = ["nikto", "sqlmap", "nmap", "dirbuster", "gobuster", "masscan", "wpscan"]

# L2 deep — optional second provider for ambiguous cases
[reasoning.l2_deep]
enabled = false
provider = ""

# ── Provider: Gemini ────────────────────────────────────────────────────────

[reasoning.gemini]
flash_model = "gemini-2.5-flash"
pro_model = "gemini-2.5-pro"
rate_limit = 8
rate_limit_period = 60
request_timeout = 45
max_retries = 5

# ── Provider: Ollama ────────────────────────────────────────────────────────

[reasoning.ollama]
base_url = "http://localhost:11434"
model = "llama3"

# ── Provider: OpenAI ────────────────────────────────────────────────────────

[reasoning.openai]
base_url = "https://api.openai.com/v1"
fast_model = "gpt-4o-mini"
deep_model = "gpt-4o"

# ── Alerting ─────────────────────────────────────────────────────────────────

[alerting]
enabled = true
channels = ["console"]
min_severity = "medium"

[alerting.telegram]
chat_id = ""
bot_token_secret = "TELEGRAM_BOT_TOKEN"

# ── Mitigation ───────────────────────────────────────────────────────────────

[mitigation]
enabled = true
dry_run = true
auto_approve_severity = []
data_dir = "data"

[mitigation.hitl]
timeout = 300

[mitigation.executor]
nginx_config_dir = "/etc/nginx/conf.d"
nginx_reload_cmd = "sudo nginx -s reload"
ufw_cmd = "sudo ufw"
rollback_on_failure = true
